<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zenora</title>
  <meta name="description" content="Zenora creates calming wellness music for sleep, meditation, yoga, focus, and relaxation.">
  <style>
    :root {
      --ink: #1f2724;
      --muted: #66726d;
      --line: #d8ded9;
      --bg: #f7f5ef;
      --paper: #fffdf8;
      --accent: #406a5d;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
    }
    main {
      width: min(860px, calc(100% - 32px));
      margin: 0 auto;
      padding: 64px 0;
    }
    section {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(30px, 5vw, 56px);
      box-shadow: 0 20px 50px rgba(31, 39, 36, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(42px, 7vw, 68px);
      line-height: 1.05;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 18px;
      font-size: 18px;
    }
    .muted {
      color: var(--muted);
    }
    a {
      color: var(--accent);
      font-weight: 650;
    }
    nav {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Zenora</h1>
      <p>Zenora creates calming wellness music for sleep, meditation, yoga, focus, and relaxation.</p>
      <p class="muted">This site supports Zenora's official publishing tools and platform integrations.</p>
      <nav>
        <a href="https://www.youtube.com/@zenora-e5x">YouTube Channel</a>
        <a href="privacy-policy.html">Privacy Policy</a>
      </nav>
    </section>
  </main>
</body>
</html>
